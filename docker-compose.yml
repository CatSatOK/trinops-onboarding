services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data

  tracker:
    build: .
    command: ["streamlit", "run", "tracker/app.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://app:8000
    env_file:
      - path: .env
        required: false
    depends_on:
      - app
    volumes:
      - ./data:/app/data
    # Override the image HEALTHCHECK (which probes the API on :8000): the tracker
    # runs Streamlit, which exposes its own health endpoint on 8501.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=2).status == 200 else 1)"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
