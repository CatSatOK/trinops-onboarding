services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data

  tracker:
    build: .
    command: ["streamlit", "run", "tracker/app.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://app:8000
    env_file:
      - path: .env
        required: false
    depends_on:
      - app
    volumes:
      - ./data:/app/data
